apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ProxmoxMachineTemplate
metadata:
  name: cluster-name-workers
spec:
  template:
    spec:
      sourceNode: pve
      templateID: 9000
      full: true
      numSockets: 2
      numCores: 2
      memoryMiB: 8192
      disks:
        bootVolume:
          disk: scsi0
          sizeGb: 100
      network:
        default:
          bridge: vmbr0
          model: virtio
      checks:
        skipCloudInitStatus: true
