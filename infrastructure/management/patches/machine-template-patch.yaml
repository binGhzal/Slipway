apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ProxmoxMachineTemplate
metadata:
  name: slipway-mgmt-cp
spec:
  template:
    spec:
      sourceNode: pve
      templateID: 9000
      format: qcow2
      full: true
      numSockets: 1
      numCores: 2
      memoryMiB: 8192
      disks:
        bootVolume:
          disk: scsi0
          sizeGb: 50
      network:
        default:
          bridge: vmbr0
          model: virtio
          vlan: 2
      checks:
        skipCloudInitStatus: true
