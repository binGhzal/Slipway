apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - ../../bases/proxmox-talos
patches:
  # Rename all resources to homelab-*
  - target:
      kind: Cluster
      name: cluster-name
    patch: |-
      - op: replace
        path: /metadata/name
        value: homelab
  - target:
      kind: ProxmoxCluster
      name: cluster-name
    patch: |-
      - op: replace
        path: /metadata/name
        value: homelab
  - target:
      kind: TalosControlPlane
      name: cluster-name-cp
    patch: |-
      - op: replace
        path: /metadata/name
        value: homelab-cp
  - target:
      kind: ProxmoxMachineTemplate
      name: cluster-name-cp
    patch: |-
      - op: replace
        path: /metadata/name
        value: homelab-cp
  - target:
      kind: TalosConfigTemplate
      name: cluster-name-workers
    patch: |-
      - op: replace
        path: /metadata/name
        value: homelab-workers
  - target:
      kind: ProxmoxMachineTemplate
      name: cluster-name-workers
    patch: |-
      - op: replace
        path: /metadata/name
        value: homelab-workers
  - target:
      kind: MachineDeployment
      name: cluster-name-workers
    patch: |-
      - op: replace
        path: /metadata/name
        value: homelab-workers
  # Apply spec patches
  - target:
      kind: Cluster
      name: homelab
    path: patches/cluster-patch.yaml
  - target:
      kind: ProxmoxCluster
      name: homelab
    path: patches/proxmox-cluster-patch.yaml
  - target:
      kind: TalosControlPlane
      name: homelab-cp
    path: patches/control-plane-patch.yaml
  - target:
      kind: ProxmoxMachineTemplate
      name: homelab-cp
    path: patches/machine-template-patch.yaml
  - target:
      kind: TalosConfigTemplate
      name: homelab-workers
    path: patches/worker-config-patch.yaml
  - target:
      kind: ProxmoxMachineTemplate
      name: homelab-workers
    path: patches/worker-machine-template-patch.yaml
  - target:
      kind: MachineDeployment
      name: homelab-workers
    path: patches/machine-deployment-patch.yaml
namespace: homelab
