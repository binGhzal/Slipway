apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: homelab-workers
  namespace: homelab
spec:
  clusterName: homelab
  replicas: 2
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: homelab
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: homelab
    spec:
      clusterName: homelab
      version: v1.32.0
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
          kind: TalosConfigTemplate
          name: homelab-workers
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: ProxmoxMachineTemplate
        name: homelab-workers
---
apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
kind: TalosConfigTemplate
metadata:
  name: homelab-workers
  namespace: homelab
spec:
  template:
    spec:
      generateType: worker
      talosVersion: v1.9
      strategicPatches:
        - machine:
            install:
              disk: /dev/sda
              extraKernelArgs:
                - net.ifnames=0
            network:
              interfaces:
                - interface: eth0
                  dhcp: true
          cluster:
            network:
              cni:
                name: none
            proxy:
              disabled: true
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ProxmoxMachineTemplate
metadata:
  name: homelab-workers
  namespace: homelab
spec:
  template:
    spec:
      sourceNode: pve
      templateID: 9000
      full: true
      numSockets: 2
      numCores: 2
      memoryMiB: 8192
      disks:
        bootVolume:
          disk: scsi0
          sizeGb: 100
      network:
        default:
          bridge: vmbr0
          model: virtio
          vlan: 2
      checks:
        skipCloudInitStatus: true
      metadataSettings:
        providerIDInjection: true
