apiVersion: bootstrap.cluster.x-k8s.io/v1alpha3
kind: TalosConfigTemplate
metadata:
  name: homelab-workers
spec:
  template:
    spec:
      generateType: worker
      configPatches:
        - op: replace
          path: /cluster/proxy
          value:
            disabled: true
        - op: replace
          path: /machine/install
          value:
            disk: /dev/sda
            image: factory.talos.dev/installer/53513e54bb39202f35694412577a6bc53d484744d35a126e5d42ef34785c0d83:v1.12.6
        - op: add
          path: /machine/kubelet/extraArgs
          value:
            cloud-provider: external
            rotate-server-certificates: "true"
