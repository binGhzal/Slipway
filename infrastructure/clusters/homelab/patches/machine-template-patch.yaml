apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ProxmoxMachineTemplate
metadata:
  name: homelab-cp
spec:
  template:
    spec:
      sourceNode: pve
      templateID: 9000
      numSockets: 2
      numCores: 4
      memoryMiB: 16384
      disks:
        bootVolume:
          disk: scsi0
          sizeGb: 100
      network:
        default:
          bridge: vmbr0
          model: virtio
          vlan: 2
      skipCloudInitStatus: true
