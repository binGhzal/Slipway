apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-config-mgmt
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/binGhzal/Slipway.git
    targetRevision: main
    path: platform/cilium-config
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
