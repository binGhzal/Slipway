argo-cd:
  global:
    domain: argocd.local
  server:
    service:
      type: LoadBalancer
  configs:
    params:
      server.insecure: true
    cm:
      admin.enabled: true
      timeout.reconciliation: 180s
  controller:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
  redis:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
