kube-prometheus-stack:
  grafana:
    enabled: true
    adminPassword: "" # Set via secret
    persistence:
      enabled: true
      size: 5Gi
  prometheus:
    prometheusSpec:
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
  alertmanager:
    enabled: true
