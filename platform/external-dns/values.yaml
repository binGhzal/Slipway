external-dns:
  provider:
    name: cloudflare
  policy: sync
  sources:
    - gateway-httproute
    - gateway-grpcroute
    - gateway-tlsroute
    - service
  txtOwnerId: slipway-mgmt
  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: cloudflare-api-token
          key: api-token
