apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyrra
  labels:
    app.kubernetes.io/name: pyrra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pyrra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pyrra
    spec:
      containers:
        - name: pyrra
          image: ghcr.io/pyrra-dev/pyrra:latest
          args:
            - api
            - --prometheus-url=http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
            - --api-url=http://localhost:9444
          ports:
            - name: http
              containerPort: 9099
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pyrra
  labels:
    app.kubernetes.io/name: pyrra
spec:
  type: ClusterIP
  ports:
    - port: 9099
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: pyrra
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pyrra
  labels:
    app.kubernetes.io/name: pyrra
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: pyrra
  endpoints:
    - port: http
      interval: 30s
