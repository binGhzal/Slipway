# ClusterSecretStore - 1Password Connect backend
# ESO pulls secrets from 1Password automatically.
# No manual encryption/decryption. Fully hands-off.
#
# Prerequisites:
#   1. 1Password Connect server deployed (or use 1Password cloud)
#   2. Connect token stored in K8s secret (created by task mgmt:eso)
#   3. Secrets stored in 1Password vault as items with fields
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepassword:
      connectHost: https://connect.example.com  # Override with your 1Password Connect host
      vaults:
        homelab: 1  # Vault name -> priority
      auth:
        secretRef:
          connectTokenSecretRef:
            name: onepassword-connect-token
            namespace: external-secrets
            key: token
