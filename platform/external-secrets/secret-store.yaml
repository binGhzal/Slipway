# ClusterSecretStore - connects ESO to your secret backend.
# This file is a template. Choose your backend and uncomment the relevant section.
# The bootstrap credential is created by `task mgmt:eso` from .env values.
#
# After GitOps bootstrap, ESO pulls all secrets automatically.
# You never manually encrypt or decrypt anything.

# --- Option 1: 1Password Connect ---
# apiVersion: external-secrets.io/v1beta1
# kind: ClusterSecretStore
# metadata:
#   name: onepassword
# spec:
#   provider:
#     onepassword:
#       connectHost: https://connect.your-domain.com
#       vaults:
#         homelab: 1
#       auth:
#         secretRef:
#           connectTokenSecretRef:
#             name: onepassword-connect-token
#             namespace: external-secrets
#             key: token

# --- Option 2: Infisical ---
# apiVersion: external-secrets.io/v1beta1
# kind: ClusterSecretStore
# metadata:
#   name: infisical
# spec:
#   provider:
#     infisical:
#       auth:
#         universalAuthCredentials:
#           clientId:
#             value: your-client-id
#           clientSecret:
#             secretRef:
#               name: infisical-credentials
#               namespace: external-secrets
#               key: client-secret

# --- Option 3: Doppler ---
# apiVersion: external-secrets.io/v1beta1
# kind: ClusterSecretStore
# metadata:
#   name: doppler
# spec:
#   provider:
#     doppler:
#       auth:
#         secretRef:
#           dopplerToken:
#             name: doppler-token
#             namespace: external-secrets
#             key: token
