# ExternalSecret - pulls Proxmox API credentials from your secret store.
# CAPMOX expects lowercase keys: url, token, secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: proxmox-credentials
  namespace: slipway-mgmt
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: proxmox-credentials
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: proxmox
        property: url
    - secretKey: token
      remoteRef:
        key: proxmox
        property: token
    - secretKey: secret
      remoteRef:
        key: proxmox
        property: secret
