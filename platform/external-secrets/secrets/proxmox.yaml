# ExternalSecret - pulls Proxmox API credentials from your secret store.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: proxmox-credentials
  namespace: slipway-mgmt
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: proxmox-credentials
    creationPolicy: Owner
  data:
    - secretKey: PROXMOX_URL
      remoteRef:
        key: proxmox
        property: url
    - secretKey: PROXMOX_TOKEN
      remoteRef:
        key: proxmox
        property: token
    - secretKey: PROXMOX_SECRET
      remoteRef:
        key: proxmox
        property: secret
