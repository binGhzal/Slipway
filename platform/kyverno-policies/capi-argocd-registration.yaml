# Kyverno ClusterPolicy: Auto-register CAPI clusters in ArgoCD
#
# When CAPI provisions a cluster, it creates a Secret named
# <cluster-name>-kubeconfig with label cluster.x-k8s.io/cluster-name.
# This policy watches for those secrets and generates ArgoCD cluster
# secrets with Slipway labels for ApplicationSet targeting.
#
# synchronize: true ensures the ArgoCD secret is updated when the
# CAPI kubeconfig rotates.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: capi-to-argocd-cluster-registration
  annotations:
    policies.kyverno.io/title: CAPI to ArgoCD Cluster Registration
    policies.kyverno.io/description: >-
      Automatically creates ArgoCD cluster secrets from CAPI kubeconfig
      secrets, enabling ApplicationSets to target new clusters immediately.
spec:
  generateExisting: true
  rules:
    - name: generate-argocd-cluster-secret
      match:
        all:
          - resources:
              kinds:
                - v1/Secret
              names:
                - "*-kubeconfig"
              selector:
                matchLabels:
                  cluster.x-k8s.io/cluster-name: "*"
      exclude:
        any:
          # Don't register the management cluster with itself
          - resources:
              namespaces:
                - slipway-mgmt
      context:
        - name: clusterName
          variable:
            jmesPath: 'request.object.metadata.labels."cluster.x-k8s.io/cluster-name"'
        - name: kubeconfigData
          variable:
            jmesPath: "request.object.data.value"
        - name: kubeconfig
          variable:
            jmesPath: "base64_decode(kubeconfigData) | parse_yaml(@)"
        - name: serverUrl
          variable:
            jmesPath: "kubeconfig.clusters[0].cluster.server"
        - name: caData
          variable:
            jmesPath: 'kubeconfig.clusters[0].cluster."certificate-authority-data"'
        - name: certData
          variable:
            jmesPath: 'kubeconfig.users[0].user."client-certificate-data"'
        - name: keyData
          variable:
            jmesPath: 'kubeconfig.users[0].user."client-key-data"'
      generate:
        synchronize: true
        apiVersion: v1
        kind: Secret
        namespace: argocd
        name: "{{ clusterName }}-cluster-secret"
        data:
          metadata:
            labels:
              argocd.argoproj.io/secret-type: cluster
              slipway.io/platform: "true"
              slipway.io/observability: "true"
              slipway.io/security: "true"
              slipway.io/apps: "true"
              slipway.io/cluster-name: "{{ clusterName }}"
          type: Opaque
          stringData:
            name: "{{ clusterName }}"
            server: "{{ serverUrl }}"
            config: |
              {
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "{{ caData }}",
                  "certData": "{{ certData }}",
                  "keyData": "{{ keyData }}"
                }
              }
